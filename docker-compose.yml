version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: payroll-postgres
    environment:
      POSTGRES_DB: payrolldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: payroll-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: payroll-app
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/payrolldb
      DB_USERNAME: postgres
      DB_PASSWORD: yourpassword
      GROQ_API_KEY: 
      JWT_SECRET: ThisIsASecretKeyThatMustBe32CharsLong!!
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"

volumes:
  postgres_data: