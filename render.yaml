databases:
  - name: payroll-db
    databaseName: payrolldb
    user: payroll_user
    plan: free

services:
  # Redis Cache Service
  - type: pserv
    name: payroll-redis
    env: image
    image: redis:alpine
    plan: free
    ipAddress: private

  # Java Spring Boot Application Service
  - type: web
    name: payroll-app
    env: docker
    plan: free
    repo: https://github.com/vikas9013/EmployeePayrollSystem.git
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: payroll-db
          property: jdbcConnectionString
      - key: DB_USERNAME
        fromDatabase:
          name: payroll-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: payroll-db
          property: password
      - key: REDIS_HOST
        value: payroll-redis
      - key: REDIS_PORT
        value: "6379"
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    depends_on:
      - type: pserv
        name: payroll-redis
    healthCheckPath: /actuator/health
    healthCheckStartupFailureThresholdCount: 10

  # React Frontend Service (Static Site)
  - type: static
    name: payroll-frontend
    repo: https://github.com/vikas9013/EmployeePayrollSystem.git
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: payroll-app
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
