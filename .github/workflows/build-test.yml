name: ✅ Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payrolldb
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 📦 Build with Maven
      run: mvn clean package -B
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key' }}
        JWT_SECRET: ThisIsATestSecretKeyMustBe32CharsLong!!

    - name: 📊 Generate coverage report
      run: mvn clean test jacoco:report
      env:
        DB_USERNAME: test_user
        DB_PASSWORD: test_password
        DB_URL: jdbc:postgresql://localhost:5432/payrolldb
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        GROQ_API_KEY: test-key
        JWT_SECRET: ThisIsATestSecretKeyMustBe32CharsLong!!

    - name: 🐳 Build Docker image
      run: docker build -t payroll-app:latest .

    - name: ✅ Tests passed!
      run: echo "All checks passed! Ready to deploy to Render 🚀"

