name: ✅ CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test and Package
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payrolldb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package -B
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_URL: jdbc:postgresql://localhost:5432/payrolldb
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          GROQ_API_KEY: dummy_key
          JWT_SECRET: super_secret_key_for_jwt_which_is_very_long_and_secure_12345678

      - name: Build Docker Image
        run: docker build -t employee-payroll-system:latest .

      - name: Verification Log
        run: echo "CI pipeline successfully verified build, unit tests, and Docker packaging!"
